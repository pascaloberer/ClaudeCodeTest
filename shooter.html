<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RETRO SHOOTER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    canvas { display: block; cursor: crosshair; max-width: 100vw; max-height: 100vh; aspect-ratio: 800 / 600; image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============ CONSTANTS ============
const W = 800, H = 600;
const PLAYER_SPEED = 3;
const BULLET_SPEED = 10;
const ENEMY_BULLET_SPEED = 5;
const BULLET_MAX_RANGE = 700;
const FIRE_COOLDOWN = 180;
const PLAYER_MAX_HP = 5;
const SHAKE_DURATION = 280;
const SHAKE_INTENSITY = 7;
const BARREL_LEN = 16;
const HUD_H = 44;

const PAL = {
  bg:         '#0d1117',
  grid:       '#161b22',
  player:     '#58a6ff',
  playerDark: '#1f6feb',
  barrel:     '#e6edf3',
  bullet:     '#ffa657',
  flash:      '#ffe066',
  enemy1:     '#f85149',
  enemy1dk:   '#6e1a17',
  enemy2:     '#3fb950',
  enemy2dk:   '#155724',
  enemy3:     '#d2a8ff',
  enemy3dk:   '#5a2d9e',
  hud:        '#e6edf3',
  hudBg:      'rgba(13,17,23,0.90)',
  heart:      '#f85149',
  heartEmpty: '#30363d',
  gold:       '#ffd700',
};

// ============ LEVELS ============
const LEVELS = [
  { enemies: [{ type: 'chaser', count: 5 }],                                                        speedMult: 1.0 },
  { enemies: [{ type: 'chaser', count: 7 },  { type: 'sniper', count: 2 }],                         speedMult: 1.1 },
  { enemies: [{ type: 'chaser', count: 8 },  { type: 'sniper', count: 3 }, { type: 'tank', count: 1 }], speedMult: 1.2  },
  { enemies: [{ type: 'chaser', count: 12 }, { type: 'sniper', count: 4 }, { type: 'tank', count: 2 }], speedMult: 1.35 },
  { enemies: [{ type: 'chaser', count: 15 }, { type: 'sniper', count: 6 }, { type: 'tank', count: 3 }], speedMult: 1.5  },
];

// ============ STATE ============
let gameState = 'MENU';
let currentLevel = 0;
let levelCompleteTime = 0;
let newHighScore = false;
let enemies = [], bullets = [], particles = [];
let player = {};

function setState(s) {
  gameState = s;
  if (s === 'PLAYING')       initLevel(currentLevel);
  if (s === 'SCORE_SCREEN')  saveHighScore();
}

// ============ INPUT ============
const keys = {};
const mouse = { x: W / 2, y: H / 2 };
let mouseHeld = false;

function initInput() {
  window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    if (e.key === 'Enter') handleEnter();
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * (W / r.width);
    mouse.y = (e.clientY - r.top)  * (H / r.height);
  });
  canvas.addEventListener('mousedown',  e => { if (e.button === 0) mouseHeld = true; });
  canvas.addEventListener('mouseup',    e => { if (e.button === 0) mouseHeld = false; });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  window.addEventListener('blur', () => { mouseHeld = false; });
}

function handleEnter() {
  if (gameState === 'MENU') {
    currentLevel = 0;
    initPlayer();
    setState('PLAYING');
  } else if (gameState === 'LEVEL_COMPLETE') {
    if (performance.now() - levelCompleteTime > 2000) {
      currentLevel++;
      setState('PLAYING');
    }
  } else if (gameState === 'GAME_OVER') {
    setState('SCORE_SCREEN');
  } else if (gameState === 'SCORE_SCREEN') {
    newHighScore = false;
    gameState = 'MENU';
  }
}

// ============ PLAYER ============
function initPlayer() {
  player = { x: W/2, y: H/2, hp: PLAYER_MAX_HP, angle: 0, lastShot: 0, invincible: 0, score: 0 };
}

function updatePlayer(dt, now) {
  let vx = 0, vy = 0;
  if (keys['ArrowLeft']  || keys['a']) vx -= 1;
  if (keys['ArrowRight'] || keys['d']) vx += 1;
  if (keys['ArrowUp']    || keys['w']) vy -= 1;
  if (keys['ArrowDown']  || keys['s']) vy += 1;
  if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }
  player.x = Math.max(20, Math.min(W - 20, player.x + vx * PLAYER_SPEED * dt));
  player.y = Math.max(HUD_H + 16, Math.min(H - 20, player.y + vy * PLAYER_SPEED * dt));
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  if (mouseHeld && now - player.lastShot > FIRE_COOLDOWN) {
    const tx = player.x + Math.cos(player.angle) * (BARREL_LEN + 4);
    const ty = player.y + Math.sin(player.angle) * (BARREL_LEN + 4);
    spawnBullet(tx, ty, player.angle, 'player', BULLET_SPEED);
    spawnParticles(tx, ty, 5, PAL.flash, 'flash');
    player.lastShot = now;
  }
}

function drawPlayer(ctx, now) {
  const px = Math.round(player.x), py = Math.round(player.y);
  const flashing = (now - player.invincible < 1000) && (Math.floor(now / 80) % 2 === 0);
  const fc = '#ffffff';

  ctx.save();
  ctx.translate(px, py);

  // Barrel (behind body)
  ctx.save();
  ctx.rotate(player.angle);
  ctx.fillStyle = flashing ? fc : PAL.barrel;
  ctx.fillRect(0, -2, BARREL_LEN, 4);
  ctx.restore();

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.fillRect(-6, 5, 12, 7);

  // Legs
  ctx.fillStyle = flashing ? fc : PAL.playerDark;
  ctx.fillRect(-5, 5, 4, 6);
  ctx.fillRect(1,  5, 4, 6);

  // Body outline + fill
  ctx.fillStyle = flashing ? fc : PAL.playerDark;
  ctx.fillRect(-6, -5, 12, 11);
  ctx.fillStyle = flashing ? fc : PAL.player;
  ctx.fillRect(-5, -4, 10, 9);

  // Head
  ctx.fillStyle = flashing ? fc : PAL.playerDark;
  ctx.fillRect(-4, -13, 8, 9);
  ctx.fillStyle = flashing ? fc : '#79c0ff';
  ctx.fillRect(-3, -12, 6, 7);
  // Visor
  if (!flashing) {
    ctx.fillStyle = '#e6edf3';
    ctx.fillRect(-1, -9, 4, 2);
  }

  ctx.restore();
}

function playerTakeDamage(now) {
  if (now < player.invincible) return;
  player.hp--;
  player.invincible = now + 1000;
  triggerShake();
  spawnParticles(player.x, player.y, 10, PAL.heart, 'blood');
  if (player.hp <= 0) setState('GAME_OVER');
}

// ============ ENEMIES ============
function spawnEnemy(type, angle, mult) {
  const r = 660;
  const base = {
    x: W / 2 + Math.cos(angle) * r,
    y: H / 2 + Math.sin(angle) * r,
    angle: 0, active: true, spawnTime: performance.now(),
  };
  if (type === 'chaser') return { ...base, type, hp:2, maxHp:2, speed:1.8*mult, score:100, size:8  };
  if (type === 'sniper') return { ...base, type, hp:1, maxHp:1, speed:1.0*mult, score:200, size:7,  state:'chase', stateTimer:0 };
  if (type === 'tank')   return { ...base, type, hp:6, maxHp:6, speed:0.8*mult, score:500, size:13, baseMult:mult, enraged:false };
}

function spawnWave(levelDef) {
  const total = levelDef.enemies.reduce((s, g) => s + g.count, 0);
  const offset = Math.random() * Math.PI * 2;
  let idx = 0;
  for (const group of levelDef.enemies) {
    for (let n = 0; n < group.count; n++) {
      const a = offset + (idx / total) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
      enemies.push(spawnEnemy(group.type, a, levelDef.speedMult));
      idx++;
    }
  }
}

function updateEnemies(dt, now) {
  for (const e of enemies) {
    if (!e.active) continue;
    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (e.type === 'chaser') {
      e.angle = Math.atan2(dy, dx);
      e.x += Math.cos(e.angle) * e.speed * dt;
      e.y += Math.sin(e.angle) * e.speed * dt;

    } else if (e.type === 'sniper') {
      if (e.state === 'chase') {
        e.angle = Math.atan2(dy, dx);
        e.x += Math.cos(e.angle) * e.speed * dt;
        e.y += Math.sin(e.angle) * e.speed * dt;
        if (dist < 200) { e.state = 'aim'; e.stateTimer = now + 1500; }
      } else {
        e.angle = Math.atan2(dy, dx);
        if (now > e.stateTimer) {
          spawnBullet(e.x, e.y, e.angle, 'enemy', ENEMY_BULLET_SPEED);
          e.state = 'chase';
        }
      }

    } else if (e.type === 'tank') {
      if (!e.enraged && e.hp <= 2) { e.enraged = true; e.speed = 1.4 * e.baseMult; }
      e.angle = Math.atan2(dy, dx);
      e.x += Math.cos(e.angle) * e.speed * dt;
      e.y += Math.sin(e.angle) * e.speed * dt;
    }

    if (dist < e.size + 10) playerTakeDamage(now);
  }
  enemies = enemies.filter(e => e.active);
}

function drawEnemies(ctx, now) {
  for (const e of enemies) {
    if (!e.active) continue;
    const ex = Math.round(e.x), ey = Math.round(e.y);
    const fade = Math.min(1, (now - e.spawnTime) / 400);

    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(ex, ey);

    if (e.type === 'chaser') {
      ctx.save();
      ctx.rotate(e.angle);
      // Claws
      ctx.fillStyle = PAL.enemy1dk;
      ctx.fillRect(-12, -3, 6, 6);
      ctx.fillRect(6,   -3, 6, 6);
      ctx.fillStyle = PAL.enemy1;
      ctx.fillRect(-11, -2, 4, 4);
      ctx.fillRect(7,   -2, 4, 4);
      // Body
      ctx.fillStyle = PAL.enemy1dk;
      ctx.fillRect(-7, -7, 14, 14);
      ctx.fillStyle = PAL.enemy1;
      ctx.fillRect(-6, -6, 12, 12);
      // Eyes
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(-3, -2, 2, 2);
      ctx.fillRect(1,  -2, 2, 2);
      ctx.restore();

    } else if (e.type === 'sniper') {
      const aiming = e.state === 'aim';
      ctx.save();
      ctx.rotate(e.angle);
      // Laser beam when aiming
      if (aiming) {
        ctx.strokeStyle = 'rgba(63,185,80,0.28)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(14, 0); ctx.lineTo(280, 0); ctx.stroke();
      }
      // Barrel
      ctx.fillStyle = aiming ? '#b4f5c8' : PAL.enemy2dk;
      ctx.fillRect(2, -2, 14, 3);
      // Body (tall, thin)
      ctx.fillStyle = PAL.enemy2dk;
      ctx.fillRect(-4, -8, 8, 16);
      ctx.fillStyle = PAL.enemy2;
      ctx.fillRect(-3, -7, 6, 14);
      // Scope dot
      ctx.fillStyle = aiming ? '#ffffff' : '#b4f5c8';
      ctx.fillRect(1, -4, 3, 3);
      ctx.restore();

    } else if (e.type === 'tank') {
      const hpRatio = e.hp / e.maxHp;
      ctx.save();
      ctx.rotate(e.angle);
      // Outline
      ctx.fillStyle = e.enraged ? '#9b59b6' : PAL.enemy3dk;
      ctx.fillRect(-12, -12, 24, 24);
      // Cross body = rounded corners illusion
      ctx.fillStyle = e.enraged ? '#cc88ff' : PAL.enemy3;
      ctx.fillRect(-10, -12, 20, 24);
      ctx.fillRect(-12, -10, 24, 20);
      // Damage overlay
      if (hpRatio < 1) {
        ctx.fillStyle = `rgba(0,0,0,${(1 - hpRatio) * 0.55})`;
        ctx.fillRect(-10, -10, 20, 20);
      }
      // Cannon
      ctx.fillStyle = e.enraged ? '#9b59b6' : PAL.enemy3dk;
      ctx.fillRect(4, -4, 12, 7);
      ctx.fillStyle = e.enraged ? '#cc88ff' : PAL.enemy3;
      ctx.fillRect(5, -3, 10, 5);
      // HP bar
      ctx.fillStyle = '#30363d';
      ctx.fillRect(-12, -18, 24, 4);
      ctx.fillStyle = hpRatio > 0.4 ? PAL.enemy2 : PAL.enemy1;
      ctx.fillRect(-12, -18, Math.round(24 * hpRatio), 4);
      ctx.restore();
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ============ BULLETS ============
function spawnBullet(x, y, angle, owner, speed) {
  bullets.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    owner, speed,
    color: owner === 'player' ? PAL.bullet : '#ff6b6b',
    distTraveled: 0,
    active: true,
  });
}

function updateBullets(dt, now) {
  for (const b of bullets) {
    if (!b.active) continue;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.distTraveled += b.speed * dt;
    if (b.distTraveled > BULLET_MAX_RANGE || b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) {
      b.active = false; continue;
    }
    if (b.owner === 'player') {
      for (const e of enemies) {
        if (!e.active) continue;
        const dx = e.x - b.x, dy = e.y - b.y;
        if (dx*dx + dy*dy < e.size * e.size) {
          b.active = false;
          e.hp--;
          spawnParticles(b.x, b.y, 7, PAL.bullet, 'spark');
          if (e.hp <= 0) {
            e.active = false;
            const col = e.type === 'chaser' ? PAL.enemy1 : e.type === 'sniper' ? PAL.enemy2 : PAL.enemy3;
            spawnParticles(e.x, e.y, e.type === 'tank' ? 20 : 12, col, 'explosion');
            player.score += e.score;
          }
          break;
        }
      }
    } else {
      const dx = player.x - b.x, dy = player.y - b.y;
      if (dx*dx + dy*dy < 100) { b.active = false; playerTakeDamage(now); }
    }
  }
  bullets = bullets.filter(b => b.active);
}

function drawBullets(ctx) {
  for (const b of bullets) {
    const bx = Math.round(b.x), by = Math.round(b.y);
    ctx.globalAlpha = 0.28;
    ctx.fillStyle = b.color;
    ctx.fillRect(bx - 5, by - 5, 10, 10);
    ctx.globalAlpha = 1;
    ctx.fillStyle = b.color;
    ctx.fillRect(bx - 3, by - 3, 6, 6);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(bx - 1, by - 1, 2, 2);
  }
}

// ============ PARTICLES ============
const P_CFG = {
  spark:     { speedMin:2, speedMax:5,  decay:0.07,  sizeMin:2, sizeMax:4, layer:0 },
  flash:     { speedMin:2, speedMax:6,  decay:0.13,  sizeMin:3, sizeMax:5, layer:1 },
  blood:     { speedMin:2, speedMax:5,  decay:0.04,  sizeMin:3, sizeMax:6, layer:0 },
  explosion: { speedMin:2, speedMax:7,  decay:0.025, sizeMin:2, sizeMax:8, layer:0 },
};

function spawnParticles(x, y, count, color, type) {
  const c = P_CFG[type] || P_CFG.spark;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = c.speedMin + Math.random() * (c.speedMax - c.speedMin);
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1.0,
      decay: c.decay + Math.random() * 0.015,
      size: c.sizeMin + Math.random() * (c.sizeMax - c.sizeMin),
      color, layer: c.layer,
    });
  }
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.91; p.vy *= 0.91;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles(ctx, layer) {
  for (const p of particles) {
    if (p.layer !== layer) continue;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    const s = Math.ceil(p.size);
    ctx.fillRect(Math.round(p.x) - (s >> 1), Math.round(p.y) - (s >> 1), s, s);
  }
  ctx.globalAlpha = 1;
}

// ============ SCREEN SHAKE ============
let shake = { active: false, startTime: 0 };
function triggerShake() { shake.active = true; shake.startTime = performance.now(); }

// ============ LEVEL MANAGEMENT ============
function initLevel(idx) {
  enemies = []; bullets = []; particles = [];
  player.x = W / 2; player.y = H / 2; player.invincible = 0;
  spawnWave(LEVELS[idx]);
}

function checkLevelComplete(now) {
  if (enemies.length === 0) {
    if (currentLevel >= LEVELS.length - 1) {
      setState('SCORE_SCREEN');
    } else {
      levelCompleteTime = now;
      gameState = 'LEVEL_COMPLETE';
    }
  }
}

// ============ HIGH SCORE ============
function saveHighScore() {
  const prev = +localStorage.getItem('retroShooterHiScore') || 0;
  if (player.score > prev) { localStorage.setItem('retroShooterHiScore', player.score); newHighScore = true; }
}
function getHighScore() { return +localStorage.getItem('retroShooterHiScore') || 0; }

// ============ BACKGROUND ============
function drawBackground(ctx) {
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = PAL.grid;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 32) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
  for (let y = 0; y <= H; y += 32) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
  ctx.stroke();
}

// ============ HUD ============
function drawHeart(ctx, x, y, filled) {
  ctx.fillStyle = filled ? PAL.heart : PAL.heartEmpty;
  ctx.fillRect(x+1, y,    3, 2);
  ctx.fillRect(x+5, y,    3, 2);
  ctx.fillRect(x,   y+2,  9, 3);
  ctx.fillRect(x+1, y+5,  7, 2);
  ctx.fillRect(x+2, y+7,  5, 2);
  ctx.fillRect(x+3, y+9,  3, 2);
  ctx.fillRect(x+4, y+11, 1, 2);
}

function drawHUD(ctx, now) {
  ctx.fillStyle = PAL.hudBg;
  ctx.fillRect(0, 0, W, HUD_H);
  for (let i = 0; i < PLAYER_MAX_HP; i++) drawHeart(ctx, 10 + i * 22, 10, i < player.hp);
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.hud;
  ctx.fillText(`LEVEL ${currentLevel + 1}`, W / 2, 26);
  const ec = enemies.length;
  ctx.font = '11px monospace';
  ctx.fillStyle = ec === 0 ? PAL.enemy2 : ec <= 3 ? '#ffa657' : '#8b949e';
  ctx.fillText(ec === 0 ? 'CLEAR!' : `${ec} ENEMIES`, W / 2, 39);
  ctx.textAlign = 'right';
  ctx.font = 'bold 15px monospace';
  ctx.fillStyle = PAL.hud;
  ctx.fillText(player.score.toString().padStart(7, '0'), W - 10, 26);
  ctx.textAlign = 'left';
}

// ============ SCREENS ============
function bigText(ctx, txt, y, col, sz) {
  ctx.font = `bold ${sz}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = col;
  ctx.fillText(txt, W / 2, y);
}

function drawMenu(ctx, now) {
  drawBackground(ctx);
  ctx.shadowColor = PAL.enemy1; ctx.shadowBlur = 22;
  bigText(ctx, 'RETRO SHOOTER', 185, PAL.enemy1, 50);
  ctx.shadowBlur = 0;
  if (Math.floor(now / 500) % 2 === 0) bigText(ctx, 'PRESS  ENTER  TO  PLAY', 255, PAL.hud, 22);
  bigText(ctx, 'MOVE: ARROW KEYS / WASD', 310, '#8b949e', 14);
  bigText(ctx, 'AIM: MOUSE     SHOOT: HOLD LEFT CLICK', 332, '#8b949e', 14);
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';
  const lx = W / 2 - 160;
  ctx.fillStyle = PAL.enemy1; ctx.fillText('■ CHASER  100 pts — fast, relentless',    lx, 390);
  ctx.fillStyle = PAL.enemy2; ctx.fillText('■ SNIPER  200 pts — stands off, shoots',  lx, 412);
  ctx.fillStyle = PAL.enemy3; ctx.fillText('■ TANK    500 pts — armored, enrages',    lx, 434);
  const hi = getHighScore();
  if (hi > 0) { ctx.textAlign = 'center'; bigText(ctx, `HIGH SCORE  ${hi}`, 502, PAL.gold, 18); }
}

function drawLevelComplete(ctx, now) {
  drawBackground(ctx);
  ctx.shadowColor = PAL.enemy2; ctx.shadowBlur = 18;
  bigText(ctx, `LEVEL ${currentLevel + 1}  COMPLETE!`, 210, PAL.enemy2, 38);
  ctx.shadowBlur = 0;
  bigText(ctx, `SCORE  ${player.score.toString().padStart(7,'0')}`, 272, PAL.hud, 26);
  const ready = performance.now() - levelCompleteTime > 2000;
  if (ready && Math.floor(now / 500) % 2 === 0)
    bigText(ctx, 'PRESS ENTER TO CONTINUE', 348, '#8b949e', 17);
  if (currentLevel + 2 <= LEVELS.length)
    bigText(ctx, `GET READY FOR LEVEL ${currentLevel + 2}`, 408, PAL.enemy1, 16);
}

function drawGameOver(ctx, now) {
  drawBackground(ctx);
  ctx.shadowColor = PAL.enemy1; ctx.shadowBlur = 26;
  bigText(ctx, 'GAME  OVER', 218, PAL.enemy1, 56);
  ctx.shadowBlur = 0;
  bigText(ctx, `SCORE  ${player.score.toString().padStart(7,'0')}`, 300, PAL.hud, 28);
  if (Math.floor(now / 500) % 2 === 0) bigText(ctx, 'PRESS ENTER TO CONTINUE', 378, '#8b949e', 17);
}

function drawScoreScreen(ctx, now) {
  drawBackground(ctx);
  ctx.shadowColor = PAL.enemy2; ctx.shadowBlur = 16;
  bigText(ctx, 'GAME COMPLETE', 158, PAL.enemy2, 38);
  ctx.shadowBlur = 0;
  bigText(ctx, 'FINAL SCORE', 230, '#8b949e', 18);
  bigText(ctx, player.score.toString().padStart(7,'0'), 292, PAL.hud, 48);
  const hi = getHighScore();
  if (newHighScore) {
    ctx.globalAlpha = 0.85 + 0.15 * Math.sin(now / 180);
    bigText(ctx, '★  NEW  HIGH  SCORE!  ★', 362, PAL.gold, 28);
    ctx.globalAlpha = 1;
  } else {
    bigText(ctx, `HIGH SCORE  ${hi}`, 362, PAL.gold, 22);
  }
  if (Math.floor(now / 500) % 2 === 0) bigText(ctx, 'PRESS ENTER TO PLAY AGAIN', 442, '#8b949e', 17);
}

// ============ GAME LOOP ============
let lastTime = 0;

function update(now) {
  const dt = Math.min((now - lastTime) / 16.67, 3);
  lastTime = now;
  if (gameState !== 'PLAYING') return;
  updatePlayer(dt, now);
  updateEnemies(dt, now);
  updateBullets(dt, now);
  updateParticles();
  checkLevelComplete(now);
}

function draw(now) {
  ctx.clearRect(0, 0, W, H);
  let shaking = false;
  if (shake.active) {
    const elapsed = now - shake.startTime;
    if (elapsed > SHAKE_DURATION) { shake.active = false; }
    else {
      shaking = true;
      const t = 1 - elapsed / SHAKE_DURATION;
      ctx.save();
      ctx.translate((Math.random()-0.5)*SHAKE_INTENSITY*t, (Math.random()-0.5)*SHAKE_INTENSITY*t);
    }
  }
  switch (gameState) {
    case 'PLAYING':
      drawBackground(ctx);
      drawParticles(ctx, 0);
      drawBullets(ctx);
      drawEnemies(ctx, now);
      drawPlayer(ctx, now);
      drawParticles(ctx, 1);
      drawHUD(ctx, now);
      break;
    case 'MENU':           drawMenu(ctx, now);          break;
    case 'LEVEL_COMPLETE': drawLevelComplete(ctx, now); break;
    case 'GAME_OVER':      drawGameOver(ctx, now);      break;
    case 'SCORE_SCREEN':   drawScoreScreen(ctx, now);   break;
  }
  if (shaking) ctx.restore();
}

function loop(now) { update(now); draw(now); requestAnimationFrame(loop); }

// ============ BOOTSTRAP ============
const canvas = document.getElementById('c');
canvas.width  = W;
canvas.height = H;
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
initInput();
initPlayer();
requestAnimationFrame(loop);
</script>
</body>
</html>
